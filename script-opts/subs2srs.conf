# 由 subs2srs 于 2026年3月1日 星期日 14:27:36 编写。
###
### 主要的 mpvacious 配置文件。
### 将此文件保存到 ~/.config/mpv/script-opts/subs2srs.conf
###

##
## 通用设置
##

# 新卡片的目标 Anki 牌组。支持子牌组。
deck_name=Bank::subs2srs

# 模型名称列在 Anki 的 `工具 -> 管理笔记类型` 菜单中。
# 如果您没有日语的模型，请从以下网址获取
# https://tatsumoto.neocities.org/blog/setting-up-anki.html#import-an-example-mining-deck
model_name=Japanese sentences

# 字段名称，需与所选笔记类型中的完全一致。
# 如果将 `audio_field` 或 `image_field` 留空，
# 则不会创建相应的媒体文件。
sentence_field=SentKanji
secondary_field=SentEng
audio_field=SentAudio
image_field=Image

# 添加到新笔记的标签。多个标签之间用空格分隔。
# 在 `=` 后面留空以完全禁用标签功能。
# 支持以下替换符：
#   %n - 视频名称
#   %t - 时间戳
#   %d - 集号（如果没有，则返回空）
#   %e - SUBS2SRS_TAGS 环境变量（如果已设置）
note_tag=subs2srs
#note_tag=%n %t %e
#note_tag=

# 菜单中使用字体的大小和名称
menu_font_size=24
menu_font_name=Noto Serif CJK JP

# AnkiConnect 服务器地址
# 同一设备上服务器的默认地址是 http://127.0.0.1:8765。
# 如果 Anki 正在运行且已安装 AnkiConnect，打开此 URL 应该
# 会显示当前 AnkiConnect 版本的页面。
# 如果您在 AnkiConnect 的设置中更改了 webBindAddress，请相应修改此地址。
ankiconnect_url=127.0.0.1:8765

# AnkiConnect 服务器 API 密钥（可选）
#ankiconnect_api_key=

##
## 开关选项。
## 可选值：`yes` 或 `no`。
##

# 使用 FFmpeg 编码器代替 mpv 编码器
# 如果 mpvacious 在为 Anki 卡片创建音频和图像时遇到问题，
# 将此选项设为 `yes` 应该可以解决。
#
# 需要先安装 ffmpeg 并将其添加到 PATH 环境变量中。
# https://wiki.archlinux.org/title/FFmpeg
# https://www.ffmpeg.org/download.html
#
# FFmpeg 编码器无法从远程内容（如 YouTube 视频）创建音频和图像。
use_ffmpeg=no

# 自动为新卡片创建牌组（参见 deck_name 选项）
create_deck=yes

# 允许创建具有相同句子字段的笔记。
allow_duplicates=no

# 当 mpv 启动时，自动将屏幕上出现的字幕复制到剪贴板。
# 此选项也可以在插件的 OSD 菜单中切换。
autoclip=no

# 可选模式：
# "disabled" - 禁用自动复制
# "clipboard" - 复制到系统剪贴板（例如使用 xclip）
# "goldendict" - 将字幕字符串发送到 goldendict (goldendict-ng)
# "custom_command" - 运行在 `autoclip_custom_args` 中指定的任意自定义命令
autoclip_method=clipboard

# 当自动复制启用并设置为 "custom_command" 时运行的命令。
# 如果为空，则不执行任何操作。
# 如果已设置，则调用外部程序。
# 支持以下替换符：
# %MPV_PRIMARY% - 主要字幕行
# %MPV_SECONDARY% - 次要字幕行
autoclip_custom_args=/usr/local/bin/goldendict %MPV_PRIMARY%

# 从主要字幕文本中移除所有空格。
# 对于像日语这样没有空格的语言，请将此选项设为 "yes"。
# 但是，如果 mpvacious 在字符串中检测到任何拉丁字符，则不会移除空格。
nuke_spaces=yes

# 如果设为 `yes`，输出音频文件的音量
# 将取决于导出时播放器的音量
tie_volumes=no

# 用于在 Anki 中选择要更新的卡片时，不允许
# 覆盖超过下面指定的数量
# 请记住，通常拥有多个具有相同句子
# 和相同音频记录的卡片是不好的做法。
card_overwrite_safeguard = 1

# 在复制到剪贴板之前，移除括号内的文本以及
# 可能干扰 Rikaitan 的前导/尾随/全角/重复空格或
# 换行符
clipboard_trim_enabled=yes

# 在字段数据之前或之后添加媒体
append_media=yes

# 在将 %n 替换到标签中之前，移除方括号内的文本
tag_nuke_brackets=yes

# 在将 %n 替换到标签中之前，移除括号内的文本
tag_nuke_parentheses=no

# 在将 %n 替换到标签中之前，移除集号
tag_del_episode_num=yes

# 在将 %n 替换到标签中之前，移除集号之后的所有内容
# 如果上一个选项 tag_del_episode_num 被禁用，则此选项无效。
tag_del_after_episode_num=yes

# 为标签功能将文件名转换为小写。
tag_filename_lowercase=no

# 允许禁用 mpvacious 对 Anki 浏览器的操作。
disable_gui_browse=no

# 在笔记创建（或笔记更新）后，
# 自动在后台播放音频片段，以确保音频被正确剪辑。
preview_audio=no

# 选择字幕行时，在屏幕上打印它们。
show_selected_text=yes

# 为方便起见，在制作卡片前从磁盘读取配置文件。
# 如果您经常更改配置，这很有用，因为您不必每次都重启 mpv，
# 但从磁盘读取会花费一些时间。
reload_config_before_card_creation=yes

##
## 图像设置
##

# 截图格式。
# 除非您的电脑不支持 `webp` 或 `avif`，否则不要切换到 `jpg`。
snapshot_format=avif
#snapshot_format=webp
#snapshot_format=jpg

# 生成图像文件的质量。0 = 最低，100 = 最高。
snapshot_quality=15

# 图像尺寸
# 如果宽度或高度参数中的任何一个（但不是两个同时）为 -2，
# 则该值将在保持纵横比的情况下计算得出。
snapshot_width=-2
snapshot_height=350

# 截图（是，否）
# 通常不需要。
# 制作 Anki 卡片时，创建屏幕截图（通过调用 'screenshot-to-file'）而不是快照。
# 如果设为 yes，由于 mpv 的限制，无法控制图像尺寸和质量。
# 但仍会遵循 'snapshot_format' 设置。
# 使用此选项时，推荐使用自定义同步服务器，例如 https://github.com/ankicommunity/anki-sync-server
screenshot=no

# 导出到 Anki 图像字段时使用的确切图像模板。
# 添加 data-editor-shrink="true" 可以使图像在 Anki 查看器中默认显示较小
# （适用于 2.1.53+ 版本，相当于双击图像的效果）。
# 除非您确切知道自己在做什么，否则可能不想更改此项。
image_template=<img alt="snapshot" src="%s">
#image_template=<img alt="snapshot" data-editor-shrink="true" src="%s">

# 类似于 image_template，但用于音频。
# 通常，用户不需要更改此设置，
# 但可能需要它才能使音频文件在 AnkiWeb 上播放。
audio_template=[sound:%s]
#audio_template=<audio controls="" src="%s"></audio>

##
## 动态快照
## 启用后，将使用 mpvacious 选择的开始到结束时间捕获视频，生成动态快照（类似于 GIF）。
##

# 如果启用，则生成动态快照而不是静态快照。
animated_snapshot_enabled=no

# 动态快照格式。类似于 "snapshot_format"，但用于动态图像。可以是 avif 或 webp。
animated_snapshot_format=avif
#animated_snapshot_format=webp

# 每秒帧数，介于 0 到 30（含 30）之间的值
# 较高的值会提高质量和文件大小，较低的值则相反
animated_snapshot_fps=10

# 动态快照尺寸
# 如果宽度或高度参数中的任何一个（但不是两个同时）为 -2，
# 则该值将在保持纵横比的情况下计算得出。
animated_snapshot_width=-2
animated_snapshot_height=200

# 生成动画的质量，0 = 最低，100 = 最高
animated_snapshot_quality=5

##
## 音频设置
##

# 音频格式。
# 推荐使用 Opus 格式。
audio_format=opus
#audio_format=mp3

# Opus 文件的容器。
# 在某些计算机或设备上，可能需要为 Opus 使用不同的容器。
# 例如运行专有操作系统（如 AnkiMobile）的设备就是这种情况。不鼓励使用它们。
# ・ Ogg/Opus 在除 Safari 和 AnkiMobile 之外的任何地方（包括 AnkiWeb）都能播放。
# ・ M4A（iOS 17.2 及更早版本）和 WEBM（自 iOS 17.4 起）在任何地方都能播放。
# ・ 对于较旧的 iOS，可以使用 CAF 容器中的 Opus。CAF 仅在 Anki 桌面版、Safari 和 AnkiMobile 上播放。
# ・ （iOS 锁定模式会完全禁用 Opus 支持，
#    不过您可以尝试为 AnkiMobile 添加例外。）
opus_container=ogg
#opus_container=opus
#opus_container=m4a
#opus_container=webm
#opus_container=caf

# 合理的值：对于 opus 为 16k-32k，对于 mp3 为 64k-128k。
audio_bitrate=24k

# 为对话时间设置填充。0.5 = 半秒。
# 填充永远不会应用于手动设置的时间。
audio_padding=0.0
#audio_padding=0.5

##
## Forvo 支持（仅限 Rikaitan 用户）
##

# yes    - 如果 Rikaitan 找不到音频，则从 Forvo 获取音频（默认）
# always - 始终从 Forvo 获取音频，并替换 Rikaitan 添加的音频
# no     - 从不使用 Forvo
use_forvo=yes

# 词汇字段应与 Rikaitan 中的 {expression} 字段相同
vocab_field=VocabKanji

# 词汇音频字段应与 Rikaitan 中的 {audio} 字段相同
vocab_audio_field=VocabAudio

##
## 杂项信息
## 可以在卡片的指定字段中写入的各种上下文信息。
##

# yes 启用，no 禁用。
miscinfo_enable=yes

# 字段名称
miscinfo_field=Notes

# 用于填充杂项信息字段的格式字符串。
# 它支持与 `note_tag` 相同的替换符。支持 HTML。
miscinfo_format=%n EP%d (%t)
#miscinfo_format=来自 <b>mpvacious</b> %n 于 %t。

##
## 次字幕
## Mpvacious 可以尝试自动加载显示在顶部的次字幕。
## 例如，您可能希望将英文字幕与日文字幕一起加载。
##
## 次字幕应包含在容器中。
## 但如果从命令行手动设置了次字幕轨道 ID，mpvacious 将不会更改它。
##

# 文件打开时自动加载次字幕轨道。
secondary_sub_auto_load=yes

# 次字幕的语言。这是您的母语或您精通的语言。
# 如果将此参数留空，将不会自动加载次字幕。
secondary_sub_lang=chs,zh,chi,zho,cn,sc
#secondary_sub_lang=

# 悬停区域。
# mpv 窗口顶部区域的比例，悬停在该区域时会显示次字幕。
# 可能的值：0.0 到 1.0
secondary_sub_area=0.15

# 可见性状态
# 可以设置为：'auto'、'never'、'always'。
# 如果设置为 'never' 或 'always'，secondary_sub_area 无效。
# 如果设置为 'auto'，可见性将根据 secondary_sub_area 的值变化。
# 切换此值的默认绑定键：Ctrl+v。
secondary_sub_visibility=always

# 执行两遍响度归一化。
# 参数说明可参考例如：
# https://auphonic.com/blog/2013/01/07/loudness-targets-mobile-audio-podcasts-radio-tv/
# https://auphonic.com/blog/2019/08/19/dynamic-range-processing/
# 在启用此选项之前，请确保从自定义参数中移除 loudnorm。
loudnorm=no
loudnorm_target=-16
loudnorm_range=11
loudnorm_peak=-1.5

##
## 自定义音频编码参数
## 这些参数会被添加到命令行中。
## `mpv` 和 `ffmpeg` 接受的参数略有不同。
## 您可以自行尝试，但请小心，否则媒体创建可能会停止工作。
##

# 自定义参数中的 loudnorm 是为向后兼容性保留的。
# 在启用两遍 loudnorm 之前，请确保从自定义参数中移除所有对 loudnorm 的提及
# （例如，将其设置为空字符串）。
# 同时通过开关和自定义参数启用 loudnorm
# 可能导致不可预测的结果。

# Ffmpeg
ffmpeg_audio_args=-af loudnorm=I=-16:TP=-1.5:LRA=11:dual_mono=true
#ffmpeg_audio_args=
#ffmpeg_audio_args=-af silenceremove=1:0:-50dB

# mpv
# mpv 将每个过滤器作为单独的参数接受，例如 --af-append=1 --af-append=2
mpv_audio_args=--af-append=loudnorm=I=-16:TP=-1.5:LRA=11:dual_mono=true
#mpv_audio_args=
#mpv_audio_args=--af-append=silenceremove=1:0:-50dB


##
## 自定义字幕过滤器
## 将 `subs2srs_sub_filter.lua` 文件
## 放置在 `~/.config/mpv/subs2srs_sub_filter` 目录中。
## 自定义脚本必须返回一个表
## 该表包含 `preprocess` 或 `trim` 函数（或两者都有）。
##
## - `preprocess(text)`：在修剪/清理之前执行。
## - `trim(text)`：替换内置的修剪逻辑。
##

# 默认启用自定义字幕预处理（yes，no）
custom_sub_filter_enabled=no

# 切换时的通知前缀
custom_sub_filter_notification=自定义字幕过滤器

# 使用自定义修剪代替内置修剪（yes，no）
use_custom_trim=no

##
## 新笔记检查定时器
##

# 启用检查笔记定时器功能。
# 如果设为 `yes`，mpvacious 将定期检查 Anki 中的新笔记
# 并在它们匹配配置的笔记类型时自动用媒体更新它们
# 例如，您使用 GoldenDict、Rikaitan 等创建了一个笔记，
# 然后 mpvacious 更新该笔记，并自动添加音频和图像。
enable_new_note_timer=yes

# 检查新笔记的间隔时间（秒）。
# 此设置控制 mpvacious 检查 Anki 中新笔记的频率。
# 仅在 enable_new_note_timer 设为 `yes` 时使用。
new_note_timer_interval_seconds=2